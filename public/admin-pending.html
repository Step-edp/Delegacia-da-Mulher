<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOs Pendentes - Delegacia da Mulher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/admin-pending.css?v=20260423a" />
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <main class="page">
    <header class="hero">
      <div>
        <p class="tag">Delegacia da Mulher</p>
        <h1>BOs Pendentes</h1>
        <p class="subtitle">Lista de boletins aguardando vinculo de arquivos BO + Extrato.</p>
      </div>
      <div class="hero-actions">
        <a href="/admin/painel" class="icon-btn icon-btn-secondary" aria-label="Voltar ao painel" title="Voltar ao painel">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 12H5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><path d="M12 19l-7-7 7-7" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
        </a>
        <button id="refreshBtn" class="icon-btn icon-btn-primary" type="button" aria-label="Atualizar BOs pendentes" title="Atualizar BOs pendentes">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.34-5.66" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><path d="M20 4v6h-6" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
        </button>
      </div>
    </header>

    <section class="panel">
      <div class="summary-row pending-summary-row">
        <div>
          <strong>Total pendente:</strong>
          <span id="pendingCount">0</span>
        </div>
        <div>
          <strong>Exibindo:</strong>
          <span id="pendingVisibleCount">0</span>
        </div>
      </div>
      <div class="pending-toolbar">
        <label class="search-field" for="pendingSearchInput">
          <span class="search-label">Pesquisar BO pendente</span>
          <input id="pendingSearchInput" type="search" placeholder="BO, natureza, vitima, indiciado, local ou flagrante" autocomplete="off" />
        </label>
      </div>
      <div id="pendingList" class="list pending-cards"></div>
    </section>
  </main>

  <script src="/scripts/admin-pending.js?v=20260417r"></script>
  <script src="/scripts/admin-shell.js"></script>
</body>
</html>
