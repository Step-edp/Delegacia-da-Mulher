<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificado de não agendamento - Delegacia da Mulher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/admin-pending.css" />
  <link rel="stylesheet" href="/styles/admin-messages.css?v=20260423a" />
  <link rel="stylesheet" href="/styles/admin-certificate.css?v=20260423b" />
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <main class="page">
    <header class="hero">
      <div>
        <p class="tag">Delegacia da Mulher</p>
        <h1>Certificado de não agendamento</h1>
        <p class="subtitle">Consulte o histórico e gere o PDF do certificado por caso.</p>
      </div>
      <div class="hero-actions">
        <a href="/admin/painel" class="icon-btn icon-btn-secondary" aria-label="Voltar ao painel" title="Voltar ao painel">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 12H5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><path d="M12 19l-7-7 7-7" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
        </a>
      </div>
    </header>

    <section class="panel compose-panel certificate-search-panel">
      <div class="certificate-search-shell">
        <label class="draft-field" for="boNumberInput">
          <span class="draft-label">Número do BO</span>
          <div class="certificate-search-input-wrap">
            <span class="certificate-search-icon" aria-hidden="true">⌕</span>
            <input id="boNumberInput" type="text" inputmode="text" placeholder="Ex.: 12345/2026" autocomplete="off" />
          </div>
        </label>
      </div>
      <div class="hero-actions">
        <button id="loadHistoryBtn" class="ghost-btn" type="button">Carregar histórico</button>
        <button id="downloadCertificateBtn" class="ghost-btn" type="button" disabled>Baixar certificado PDF</button>
      </div>
      <p id="certificateStatus" class="draft-status muted">Informe o número do BO para consultar.</p>
    </section>

    <section class="panel compose-panel">
      <h2>Histórico do caso</h2>
      <div id="historyContainer" class="draft-grid">
        <p class="muted">Nenhum histórico carregado.</p>
      </div>
    </section>
  </main>

  <script src="/scripts/admin-certificate.js?v=20260423b"></script>
  <script src="/scripts/admin-shell.js"></script>
</body>
</html>
